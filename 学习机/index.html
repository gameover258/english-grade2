<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🎓 新交际英语二年级上册 · 学习机</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="stylesheet" href="css/components.css?v=4">
</head>
<body>
  <div id="app">
    <!-- ===== 顶部标题栏 ===== -->
    <header id="topbar">
      <span class="logo">🎓</span>
      <h1>新交际英语二年级上册 · 学习机</h1>
      <span id="clock"></span>
    </header>

    <!-- ===== 主体布局 ===== -->
    <div id="main-layout">
      <!-- 左侧导航 -->
      <nav id="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">📖 按单元学习</div>
          <ul id="unit-list"></ul>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-actions">
          <button class="sidebar-btn" id="btn-vocab" onclick="document.getElementById('vocab-overlay').className='overlay-active';renderVocab()">📚 词汇表</button>
        </div>
      </nav>

      <!-- 右侧内容区：课本 + 媒体 -->
      <main id="content">
        <div id="textbook-view">
          <!-- 课本区域（由 pdf-viewer.js 渲染） -->
          <div id="pdf-container"></div>
          <!-- 媒体面板（由 pdf-viewer.js 渲染） -->
          <div id="media-panel"></div>
        </div>
      </main>
    </div>

        <!-- ===== 移动端浮动底栏 ===== -->
        <div id="audio-indicator" class="audio-indicator" onclick="toggleIndicatorMenu()">
      <span id="ai-icon">🎵</span>
      <span id="ai-label"></span>
      <span id="ai-time"></span>
      <span id="ai-arrow" style="font-size:10px;opacity:0.6;">▼</span>
    </div>
    <div id="indicator-menu" class="indicator-menu"></div>

    <div id="mobile-bar">
      <button id="mobile-unit-btn" class="mobile-unit-btn">● <span id="mobile-unit-label">Unit 1</span> · <span id="mobile-page-label">P5</span></button>
      <button id="mobile-menu-btn" class="mobile-menu-btn">☰</button>
    </div>

    <!-- ===== 移动端底部弹出面板 ===== -->
    <div id="bottom-sheet">
      <div class="sheet-backdrop" onclick="hideBottomSheet()"></div>
      <div class="sheet-panel">
        <div class="sheet-handle"></div>
        <div id="sheet-unit-list"></div>
        <div id="sheet-actions"></div>
      </div>
    </div>

<!-- ===== 视频侧弹窗 ===== -->
    <div id="video-overlay" class="overlay-hidden">
      <div id="video-overlay-bg"></div>
      <div id="video-overlay-box">
        <button id="video-close" class="overlay-close">✕</button>
        <video id="video-overlay-player" controls playsinline></video>
      </div>
    </div>

    <!-- ===== 词汇表叠加层 ===== -->
    <div id="vocab-overlay" class="overlay-hidden">
      <button id="vocab-close" class="overlay-close" onclick="this.parentElement.className='overlay-hidden';try{stopAllAudio()}catch(e){}">✕ 返回课本</button>
      <div id="vocab-content"></div>
    </div>
  </div>

  <script src="js/config.js?v=4"></script>
  <script src="js/audio-player.js?v=4"></script>
  <script src="js/pdf-viewer.js?v=4"></script>
  <script src="js/video-player.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
