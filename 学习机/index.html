<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>🎓 新交际英语二年级上册 · 学习机</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div id="app">
    <!-- ===== 顶部标题栏 ===== -->
    <header id="topbar">
      <span class="logo">🎓</span>
      <h1>新交际英语二年级上册 · 学习机</h1>
      <span id="clock"></span>
    </header>

    <!-- ===== 主体布局 ===== -->
    <div id="main-layout">
      <!-- 左侧导航 -->
      <nav id="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">📖 按单元学习</div>
          <ul id="unit-list"></ul>
        </div>
        <div class="sidebar-divider"></div>
        <button class="sidebar-btn" id="btn-flashcards">📝 单词闪卡</button>
        <button class="sidebar-btn" id="btn-recorder">🎤 跟读录音</button>
        <button class="sidebar-btn" id="btn-vocab">📚 词汇表</button>
      </nav>

      <!-- 右侧内容区：课本 + 媒体 -->
      <main id="content">
        <div id="textbook-view">
          <!-- 课本区域（由 pdf-viewer.js 渲染） -->
          <div id="pdf-container"></div>
          <!-- 媒体面板（由 pdf-viewer.js 渲染） -->
          <div id="media-panel"></div>
        </div>
      </main>
    </div>

    <!-- ===== 视频侧弹窗 ===== -->
    <div id="video-overlay" class="overlay-hidden">
      <div id="video-overlay-bg"></div>
      <div id="video-overlay-box">
        <button id="video-close" class="overlay-close">✕</button>
        <video id="video-overlay-player" controls playsinline></video>
      </div>
    </div>

    <!-- ===== 单词闪卡叠加层 ===== -->
    <div id="flashcard-overlay" class="overlay-hidden">
      <button id="flashcard-close" class="overlay-close">✕ 返回课本</button>
      <div id="flashcard-content"></div>
    </div>

    <!-- ===== 跟读录音叠加层 ===== -->
    <div id="recorder-overlay" class="overlay-hidden">
      <button id="recorder-close" class="overlay-close">✕ 返回课本</button>
      <div id="recorder-content"></div>
    </div>

    <!-- ===== 词汇表叠加层 ===== -->
    <div id="vocab-overlay" class="overlay-hidden">
      <button id="vocab-close" class="overlay-close">✕ 返回课本</button>
      <div id="vocab-content"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/audio-player.js"></script>
  <script src="js/pdf-viewer.js"></script>
  <script src="js/video-player.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
